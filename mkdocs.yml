# --- Базовые настройки сайта ---
site_name: NeuroEvolution
site_description: NeuroEvolution — нейронно-генетический микрофреймворк для обучения агентов в средах Gymnasium
site_url: https://AntonGlyzin.github.io/neuro_evolution

# --- Настройка темы Material ---
theme:
  name: material
  language: ru
  logo: img/intelligence.ico
  favicon: img/intelligence.ico
  # Настройка переключателя светлой/темной темы
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Включить темную тему
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Включить светлую тему
  # Включение фишек Material темы
  features:
    - navigation.instant         # Мгновенная загрузка страниц
    - navigation.tracking        # Подсветка активного пункта меню
    - navigation.tabs            # Верхнее меню
    - navigation.sections        # Группировка пунктов в боковом меню
    - navigation.top             # Кнопка "Наверх"
    - search.suggest             # Включение поиска с подсказками
    - search.highlight           # Подсветка результатов поиска
    - content.code.copy          # Кнопка копирования для блоков кода
    - announce.dismiss
    - content.action.view
    - content.code.annotate
    - content.tabs.link
    - navigation.indexes
    - navigation.path
    - navigation.tabs.sticky

repo_url: https://github.com/AntonGlyzin/neuro_evolution
repo_name: AntonGlyzin/neuro_evolution
edit_uri: edit/main/docs/

# --- Структура навигации ---
nav:
  - Руководство: index.md
  - API:
    - Виртуальные окружения: 
      - Пример окружения: reference\environs\simple_base.md
      

validation:
  omitted_files: warn
  absolute_links: warn
  unrecognized_links: warn

markdown_extensions:
  - tables
  - toc:
      permalink: true
      title: Page contents
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
      pygments_lang_class: true
  - pymdownx.extra
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.magiclink

watch:
  - docs

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: ['..']  # относительно папки 'docs'
          options:
            docstring_style: google
            show_source: false
            show_root_heading: true